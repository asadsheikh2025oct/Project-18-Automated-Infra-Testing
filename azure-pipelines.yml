trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - 'azure-pipelines.yml'
      - README.md
      - '*.png'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Bicep
    displayName: 'Validating Bicep File'
    jobs:
      - job: ValidationJob
        displayName: 'Validating Bicep File'
        steps:
          - checkout: self
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sc-project18'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: 'az bicep build --file main.bicep'