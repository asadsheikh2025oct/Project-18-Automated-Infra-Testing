trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - 'azure-pipelines.yml'
      - README.md
      - '*.png'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Bicep
    displayName: 'Validating Bicep File'
    jobs:
      - job: ValidationJob
        displayName: 'Validating Bicep File'
        steps:
          - checkout: self
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'sc-project18'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: 'az bicep build --file main.bicep'

      - deployment: DeploymentStep
        displayName: 'deploying bicep'
        environment: production
        strategy:
          runOnce:
            deploy:
              pool:
                vmImage: 'ubuntu-latest'
              steps:
                - checkout: self
                - task: AzureResourceManagerTemplateDeployment@3
                  displayName: 'DeployingResourceNow'
                  inputs:
                    deploymentScope: 'Resource Group'
                    azureResourceManagerConnection: 'sc-project18'
                    subscriptionId: 'f2f1d6df-9422-48cb-abf1-0a4eb095ad4a'
                    action: 'Create Or Update Resource Group'
                    resourceGroupName: 'project18'
                    location: 'UK West'
                    templateLocation: 'Linked artifact'
                    csmFile: 'main.bicep'
                    deploymentMode: 'Incremental'
